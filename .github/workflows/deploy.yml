name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js for CSS building
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'static/css/package-lock.json'

      - name: Build CSS
        run: |
          cd static/css
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            latest

      - name: Extract version from git tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Azure CLI Action - Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure CLI Action - Deploy Azure Resources
        uses: Azure/cli@v2.2.0
        with:
          inlineScript: |
            # Create resource group
            az group create \
              --name gh-ghes-2-ghec-rg \
              --location "East US 2"
            
            # Create App Service Plan
            az appservice plan create \
              --name gh-ghes-2-ghec-plan \
              --resource-group gh-ghes-2-ghec-rg \
              --sku B1 \
              --is-linux
            
            # Create Web App
            az webapp create \
              --name gh-ghes-2-ghec-app \
              --resource-group gh-ghes-2-ghec-rg \
              --plan gh-ghes-2-ghec-plan \
              --deployment-container-image-name ghcr.io/${{ github.repository }}:latest
            
            # Configure container registry settings
            az webapp config appsettings set \
              --name gh-ghes-2-ghec-app \
              --resource-group gh-ghes-2-ghec-rg \
              --settings \
                WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
                DOCKER_REGISTRY_SERVER_URL=https://ghcr.io \
                DOCKER_REGISTRY_SERVER_USERNAME=${{ github.actor }} \
                DOCKER_REGISTRY_SERVER_PASSWORD=${{ secrets.GITHUB_TOKEN }}
            
            # Enable always on
            az webapp config set \
              --name gh-ghes-2-ghec-app \
              --resource-group gh-ghes-2-ghec-rg \
              --always-on true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: gh-ghes-2-ghec-app
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest