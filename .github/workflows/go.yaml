---
name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: "-buildvcs=false"
    steps:
    - uses: actions/checkout@v5

    # 1) Cache Go modules
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

    # 2) Cache Node.js dependencies for CSS
    - name: Cache Node.js dependencies
      uses: actions/cache@v4
      with:
        path: |
          static/css/node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('static/css/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    # 3) Set up Node.js for CSS building
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'static/css/package-lock.json'

    # 4) Build CSS before Go build
    - name: Build CSS
      run: |
        cd static/css
        npm ci
        npm run build

    # 5) Check formatting
    - name: go fmt
      run: |
        if [ -n "$(go fmt ./...)" ]; then
          echo "Code not formatted. Run go fmt ./..."; exit 1
        fi

    # 6) Lint CSS
    - name: Lint CSS
      run: |
        cd static/css
        npm run lint

    # 7) Lint Go
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.1

    # 8) Security check
    - name: gosec security checker
      uses: securego/gosec@v2.22.9
      with:
        args: ./...

    # 9) Build, test, vet
    - name: Build
      run: go build -v ./...

    - name: Test
      run: |
        go clean -testcache
        go test -v -coverprofile=coverage.out ./...

    - name: Vet
      run: go vet ./...
