{{define "migration_detail_content_wrapper"}}
<div class="dashboard-detail">
    <div class="stats-section">
        <div class="dashboard-header">
            <h2>Migration Details: {{.Migration.Repository}}</h2>
            <div class="dashboard-controls">
                <a href="/dashboard" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Overview
                </a>
                <button class="btn btn-secondary" hx-get="/dashboard/migration/{{.Migration.Repository}}/refresh" hx-target="#migration-detail" hx-swap="outerHTML">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
    </div>

    {{template "migration_detail_content" .}}
</div>
{{end}}
